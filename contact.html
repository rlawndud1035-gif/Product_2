<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google-adsense-account" content="ca-pub-6454047865688551">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6454047865688551" crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Pixel Bank</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="/main.js"></script>
</head>
<body style="background: #050505; color: white; line-height: 1.6;">
  <navigation-menu></navigation-menu>
  
  <main style="max-width: 800px; margin: 120px auto; padding: 0 2rem;">
    <h1 style="font-size: 3rem; margin-bottom: 2rem;">Contact Us</h1>
    <p style="font-size: 1.25rem; color: rgba(255,255,255,0.7); margin-bottom: 3rem;">We're here to help you navigate the financial ecosystem.</p>
    
    <div style="display: grid; grid-template-columns: 1fr; gap: 3rem;">
      <section style="background: rgba(255,255,255,0.03); padding: 3rem; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.05);">
        <form onsubmit="event.preventDefault(); alert('Message sent! We will get back to you soon.');">
          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: rgba(255,255,255,0.4);">Full Name</label>
            <input type="text" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 0.5rem; color: white; box-sizing: border-box;">
          </div>
          <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: rgba(255,255,255,0.4);">Email Address</label>
            <input type="email" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 0.5rem; color: white; box-sizing: border-box;">
          </div>
          <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: rgba(255,255,255,0.4);">Message</label>
            <textarea required rows="5" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 0.5rem; color: white; box-sizing: border-box; resize: vertical;"></textarea>
          </div>
          <button type="submit" style="width: 100%; padding: 1.25rem; background: white; color: black; border: none; border-radius: 0.5rem; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s;">Send Message</button>
        </form>
      </section>

      <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div>
          <h3 style="margin-bottom: 0.5rem;">Support</h3>
          <p style="color: rgba(255,255,255,0.4); font-size: 0.9rem;">support@pixelbank.example.com</p>
        </div>
        <div>
          <h3 style="margin-bottom: 0.5rem;">Press</h3>
          <p style="color: rgba(255,255,255,0.4); font-size: 0.9rem;">press@pixelbank.example.com</p>
        </div>
      </section>
    </div>
  </main>

  <site-footer></site-footer>
</body>
</html>
