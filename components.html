<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Components | Pixel Bank</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <style>
    /* Specific styles for components page layout */
    body {
      overflow: hidden !important;
    }

    .components-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }
    
    .sidebar-inset {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      margin-left: calc(var(--sidebar-width) + 4rem);
      padding: 104px var(--section-padding-h) var(--section-padding-v);
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .sidebar-inset::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-inset::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    
    /* Dynamic Content Styles */
    .content-header {
      margin-bottom: 3rem;
    }
    .content-header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #fff, #666);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .content-header p {
      color: var(--muted-foreground);
      font-size: 1.1rem;
      max-width: 600px;
    }

    /* M3 Guidelines Styling */
    .overview-display {
      margin-bottom: 4rem;
    }
    .m3-guidelines h3 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
      color: white;
    }
    .m3-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .m3-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 1.5rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .m3-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .elevated { background: #333; color: white; border: 1px solid #444; }
    .filled { background: white; color: black; }
    .tonal { background: rgba(255,255,255,0.1); color: white; }
    .outlined { border: 1px solid rgba(255,255,255,0.2); color: white; }
    .text { color: rgba(255,255,255,0.6); }

    .m3-usage {
      margin-top: 3rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 2rem;
      border-radius: 1.5rem;
    }
    .m3-usage h4 { margin-top: 0; color: white; }
    .m3-usage ul { padding-left: 1.25rem; color: rgba(255,255,255,0.6); }
    .m3-usage li { margin-bottom: 0.75rem; }

    .preview-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .preview-image {
      width: 100%;
      height: 400px;
      object-fit: crop;
      opacity: 0.8;
      transition: opacity 0.5s;
    }
    
    .code-block {
      background: #0d0d0d;
      padding: 1.5rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      margin-top: 1.5rem;
    }
    .code-block pre {
      margin: 0;
      color: oklch(0.8 0.02 250);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      overflow-x: auto;
    }
    .code-label {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
    }

    @media (max-width: 1024px) {
      body {
        overflow-y: auto !important;
      }
      .components-layout {
        flex-direction: column;
        height: auto;
      }
      .sidebar-inset {
        margin-left: 0;
        height: auto;
        padding-top: 2rem;
      }
    }
  </style>
</head>
<body style="overflow: hidden;">
  <!-- Global UI Components -->
  <auth-modal></auth-modal>
  <auth-status></auth-status>
  <navigation-menu></navigation-menu>

  <div class="components-layout">
    <app-sidebar></app-sidebar>

    <div class="sidebar-inset" id="main-content">
      <div id="content-display">
        <!-- Dynamic content will be injected here -->
        <div class="content-header">
          <h1 id="comp-title">Select a Component</h1>
          <p id="comp-desc">Explore our UI library by selecting an item from the sidebar.</p>
        </div>
        <div id="comp-view" style="display: none;">
          <!-- New Overview Display -->
          <div id="comp-overview" class="overview-display"></div>

          <div class="preview-container">
            <img id="comp-img" src="" alt="Preview" class="preview-image">
          </div>
          <div class="code-block">
            <span class="code-label">Source Code</span>
            <pre><code id="comp-code"></code></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('component-selected', (e) => {
      const data = COMPONENT_DATA[e.detail.name];
      if (!data) return;

      const title = document.getElementById('comp-title');
      const desc = document.getElementById('comp-desc');
      const overview = document.getElementById('comp-overview');
      const img = document.getElementById('comp-img');
      const code = document.getElementById('comp-code');
      const view = document.getElementById('comp-view');

      // Simple fade effect
      view.style.opacity = '0';
      
      setTimeout(() => {
        title.textContent = data.title;
        desc.textContent = data.description;
        
        // Inject overview HTML if it exists
        if (data.overview) {
          overview.innerHTML = data.overview;
          overview.style.display = 'block';
        } else {
          overview.innerHTML = '';
          overview.style.display = 'none';
        }

        img.src = data.image;
        code.textContent = data.code;
        view.style.display = 'block';
        view.style.opacity = '1';
        
        // Scroll to top
        document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
      }, 200);
    });

    // Initial load for first item
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        window.dispatchEvent(new CustomEvent('component-selected', {
          detail: { name: 'Buttons' }
        }));
      }, 500);
    });
  </script>
</body>
</html>
