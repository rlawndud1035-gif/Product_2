<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markets | Pixel Bank</title>
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { overflow: hidden !important; background: #050505; }
    .components-layout { display: flex; height: 100vh; width: 100%; overflow: hidden; }
    .sidebar-inset {
      flex: 1; height: 100vh; overflow-y: auto;
      margin-left: calc(var(--sidebar-width) + 4rem);
      padding: 104px 4rem 4rem;
    }
    .market-header { margin-bottom: 3rem; }
    .market-header h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; color: transparent; }
    .price-tag { font-size: 2.5rem; font-weight: 800; display: flex; align-items: baseline; gap: 1rem; margin: 1rem 0; }
    .change-badge { font-size: 1rem; padding: 4px 12px; border-radius: 100px; background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .change-badge.negative { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    
    .chart-container {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2rem;
      padding: 2rem;
      margin-bottom: 2rem;
      height: 450px;
      position: relative;
    }
    .info-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .description-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 2rem;
      border-radius: 1.5rem;
    }
    .description-card h3 { margin-top: 0; color: rgba(255,255,255,0.4); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .description-card p { font-size: 1.1rem; line-height: 1.6; color: rgba(255,255,255,0.7); margin: 0; }
  </style>
</head>
<body>
  <auth-modal></auth-modal>
  <auth-status></auth-status>
  <navigation-menu></navigation-menu>

  <div class="components-layout">
    <app-sidebar></app-sidebar>

    <div class="sidebar-inset" id="main-content">
      <div id="market-display">
        <div class="market-header">
          <div style="color: rgba(255,255,255,0.3); font-weight: 700; margin-bottom: 0.5rem;" id="etf-theme">Theme</div>
          <h1 id="etf-name">Select an ETF</h1>
          <div class="price-tag">
            <span id="etf-price">$0.00</span>
            <span id="etf-change" class="change-badge">+0.00%</span>
          </div>
        </div>

        <div class="chart-container">
          <canvas id="marketChart"></canvas>
        </div>

        <div class="info-grid">
          <div class="description-card">
            <h3>Fund Strategy</h3>
            <p id="etf-desc">Detailed strategy and performance overview will appear here.</p>
          </div>
          <div class="description-card">
            <h3>Market Sentiment</h3>
            <p style="color: #22c55e; font-weight: 700;">BULLISH</p>
            <div style="height: 4px; background: #22c55e; border-radius: 2px; margin-top: 1rem; width: 75%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let chartInstance = null;

    function updateChart(data) {
      const ctx = document.getElementById('marketChart').getContext('2d');
      const isPositive = !data.change.startsWith('-');
      const color = isPositive ? '#22c55e' : '#ef4444';

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct'],
          datasets: [{
            label: 'Price',
            data: data.chartData,
            borderColor: color,
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            backgroundColor: (context) => {
              const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
              gradient.addColorStop(0, color + '33');
              gradient.addColorStop(1, color + '00');
              return gradient;
            },
            pointRadius: 0,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)' } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.2)' } }
          }
        }
      });
    }

    window.addEventListener('etf-selected', (e) => {
      const data = ETF_DATA[e.detail.ticker];
      if (!data) return;

      document.getElementById('etf-theme').textContent = data.theme;
      document.getElementById('etf-name').textContent = data.name;
      document.getElementById('etf-price').textContent = '$' + data.price;
      
      const changeEl = document.getElementById('etf-change');
      changeEl.textContent = data.change;
      changeEl.className = 'change-badge ' + (data.change.startsWith('-') ? 'negative' : '');

      document.getElementById('etf-desc').textContent = data.description;
      
      updateChart(data);
    });

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        window.dispatchEvent(new CustomEvent('etf-selected', { detail: { ticker: 'QQQ' } }));
      }, 500);
    });
  </script>
</body>
</html>
